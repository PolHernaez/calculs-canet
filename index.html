<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="light">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#15643d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Càlculs Canet">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="favicon-32.png">
<title>Càlculs Canet</title>
<style>
  :root{
    --green:#15643d; --green-d:#0e4a2d; --green-l:#1c7d4d;
    --bg:#f3f5f3; --card:#ffffff; --ink:#17211c; --muted:#69776f;
    --line:#e4e8e5; --line2:#eef1ef; --chip:#eef2ef; --field:#f6f8f6;
    --pos:#15803d; --pos-bg:#e6f4eb; --neg:#b04327; --neg-bg:#f8ece7;
    --shadow:0 1px 3px rgba(20,40,30,.07), 0 6px 18px rgba(20,40,30,.05);
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;}
  input,select{font-family:inherit;font-size:16px;color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  svg{display:block;}
  .ico{width:20px;height:20px;}
  .ico-sm{width:18px;height:18px;}

  /* APP BAR */
  header{
    background:var(--green); color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 16px;
  }
  .bar{display:flex;align-items:center;gap:12px;}
  .bar h1{font-size:19px;font-weight:700;letter-spacing:-.2px;margin:0;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar .sub{font-size:12px;font-weight:500;opacity:.82;margin-top:1px;}
  .iconbtn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    color:#fff;background:rgba(255,255,255,.14);}
  .iconbtn:active{background:rgba(255,255,255,.26);}

  .summary{display:flex;gap:1px;margin-top:16px;background:rgba(255,255,255,.16);
    border-radius:12px;overflow:hidden;}
  .summary>div{flex:1;padding:10px 8px;text-align:center;background:rgba(255,255,255,.06);}
  .summary .v{font-size:17px;font-weight:700;}
  .summary .k{font-size:10.5px;opacity:.85;font-weight:500;margin-top:1px;text-transform:uppercase;letter-spacing:.4px;}

  main{max-width:680px;margin:0 auto;padding:14px 13px 6px;}
  .view{display:none;}
  .view.on{display:block;animation:f .2s ease;}
  @keyframes f{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  /* PERSON CARD */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);margin-bottom:10px;}
  .person{display:flex;align-items:center;gap:13px;padding:13px 14px;}
  .mono{width:42px;height:42px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;color:var(--green-d);background:#e3efe8;letter-spacing:.3px;}
  .person .nm{font-weight:650;font-size:15.5px;}
  .person .meta{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .person .amt{margin-left:auto;text-align:right;}
  .person .amt .p{font-weight:700;font-size:15.5px;}
  .person .amt .bal{font-size:12px;font-weight:650;margin-top:3px;}
  .bal.pos{color:var(--pos);} .bal.neg{color:var(--neg);} .bal.zero{color:var(--muted);}

  .addbtn{width:100%;padding:14px;border:1px dashed #c4d2c9;border-radius:var(--r);
    color:var(--green);font-weight:650;font-size:15px;background:var(--card);
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .addbtn:active{background:var(--chip);}

  .hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin:12px 4px 0;}

  /* RESULT */
  .sect{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);margin:6px 4px 10px;}
  .pay{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:9px;}
  .pay .who{font-weight:650;font-size:14.5px;}
  .pay .arr{color:var(--green-l);}
  .pay .val{margin-left:auto;font-weight:700;font-size:15px;background:var(--green);color:#fff;
    padding:7px 13px;border-radius:10px;}
  .balrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line2);}
  .balrow:last-child{border-bottom:none;}
  .balrow .nm{font-weight:600;}
  .balrow .meta{font-size:12px;color:var(--muted);margin-top:1px;}
  .balrow .b{margin-left:auto;font-weight:700;font-size:14.5px;padding:3px 9px;border-radius:8px;}
  .b.pos{color:var(--pos);background:var(--pos-bg);} .b.neg{color:var(--neg);background:var(--neg-bg);}
  .b.zero{color:var(--muted);background:var(--chip);}

  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    padding:14px;border-radius:12px;font-weight:700;font-size:15px;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:active{background:var(--green-d);}

  .empty{text-align:center;color:var(--muted);padding:36px 18px;font-size:14px;}

  /* BOTTOM TABS */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--card);
    border-top:1px solid var(--line);display:flex;
    padding:7px 8px calc(7px + env(safe-area-inset-bottom));}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:10px;
    color:var(--muted);font-size:11.5px;font-weight:600;}
  .tab.on{color:var(--green);}
  .tab .lab{margin-top:1px;}

  /* SHEET */
  .scrim{position:fixed;inset:0;background:rgba(15,30,22,.45);z-index:40;opacity:0;pointer-events:none;transition:.22s;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--card);
    border-radius:20px 20px 0 0;max-width:680px;margin:0 auto;max-height:92vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
    padding:6px 18px calc(20px + env(safe-area-inset-bottom));}
  .sheet.on{transform:none;}
  .grab{width:40px;height:4px;background:var(--line);border-radius:99px;margin:8px auto 12px;}
  .sheet h2{font-size:18px;font-weight:700;margin:2px 0 16px;}
  .sheet .head{display:flex;align-items:center;margin:2px 0 16px;}
  .sheet .head h2{margin:0;flex:1;}
  .sheet .head button{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    background:var(--chip);color:var(--muted);}

  label.lab2{display:block;font-size:12.5px;font-weight:650;color:var(--muted);margin:0 2px 6px;}
  .fld{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:var(--field);outline:none;}
  .fld:focus{border-color:var(--green-l);background:#fff;box-shadow:0 0 0 3px rgba(28,125,77,.12);}
  .grp{margin-bottom:15px;}
  .two{display:flex;gap:11px;}.two>*{flex:1;}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:11px;background:var(--field);overflow:hidden;}
  .stepper button{width:46px;height:48px;font-size:22px;color:var(--green);font-weight:600;flex:none;}
  .stepper button:active{background:var(--chip);}
  .stepper input{flex:1;text-align:center;border:none;background:transparent;outline:none;font-weight:700;font-size:17px;}

  .kid{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .kid .fld{flex:1;}
  .kid .w{font-size:12px;font-weight:700;padding:5px 9px;border-radius:8px;background:var(--chip);color:var(--muted);white-space:nowrap;min-width:62px;text-align:center;}
  .kid .w.p100{background:#e3efe8;color:var(--green-d);}
  .kid .w.p50{background:#fdf2dd;color:#9a6b15;}
  .kid .w.p0{background:#eef1ef;color:var(--muted);}
  .kid .del{width:40px;height:46px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--neg);background:var(--neg-bg);flex:none;}
  .addkid{display:inline-flex;align-items:center;gap:7px;color:var(--green);font-weight:650;font-size:14px;padding:8px 2px;}

  .menu a{display:flex;align-items:center;gap:13px;padding:15px 4px;font-size:15.5px;font-weight:550;
    border-bottom:1px solid var(--line2);color:var(--ink);}
  .menu a:last-child{border-bottom:none;}
  .menu a.danger{color:var(--neg);}
  .menu a .mi{width:22px;display:flex;justify-content:center;color:var(--muted);}
  .menu a.danger .mi{color:var(--neg);}

  #toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(14px);
    background:#16201b;color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:60;
    opacity:0;pointer-events:none;transition:.25s;max-width:86%;text-align:center;}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div style="flex:1;min-width:0">
      <h1 id="title">Càlculs Canet</h1>
      <div class="sub" id="subtitle">Repartiment de despeses</div>
    </div>
    <button class="iconbtn" id="settingsBtn" aria-label="Ajustos"></button>
  </div>
  <div class="summary">
    <div><div class="v num" id="sTotal">0 €</div><div class="k">Total pagat</div></div>
    <div><div class="v num" id="sPeople">0</div><div class="k">Persones</div></div>
    <div><div class="v num" id="sUnit">0 €</div><div class="k">Part justa</div></div>
  </div>
</header>

<main>
  <section class="view on" id="v-list">
    <div id="people"></div>
    <button class="addbtn" id="addBtn"></button>
    <div class="hint">Cada fila és una persona o família: el que ha pagat, quants adults i l'edat dels nens. La part justa i el saldo es calculen sols.</div>
  </section>

  <section class="view" id="v-res">
    <div id="resBody"></div>
  </section>
</main>

<nav>
  <button class="tab on" data-v="list"><span id="t1"></span><span class="lab">Despeses</span></button>
  <button class="tab" data-v="res"><span id="t2"></span><span class="lab">Qui paga a qui</span></button>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>
<div id="toast"></div>

<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const LS="calculs_canet_v2";
const fmt=new Intl.NumberFormat("ca-ES",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2});
const money=n=>fmt.format(Math.round((Number(n)||0)*100)/100+0);
const uid=()=>(crypto.randomUUID?crypto.randomUUID():"id"+Date.now()+Math.random().toString(36).slice(2));
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const IC={
  gear:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  plus:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  list:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>',
  swap:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
  arr:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
  share:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>',
  close:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  trash:'<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  beaker:'<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9V3"/></svg>',
};

let state=load()||blank();

function load(){ try{const s=localStorage.getItem(LS); if(!s)return null; const o=JSON.parse(s);
  o.config||(o.config={zero:3,full:12}); o.rows||(o.rows=[]); return o;}catch(e){return null;} }
function save(){ try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} }
function blank(){ return {config:{zero:3,full:12}, rows:[]}; }
function seed(){
  return {config:{zero:3,full:12}, rows:[
    {id:uid(),name:"Marc",paid:200,adults:2,kids:[]},
    {id:uid(),name:"Laura",paid:0,adults:1,kids:[10]},
    {id:uid(),name:"Jordi",paid:150,adults:2,kids:[6,2]},
    {id:uid(),name:"Anna",paid:100,adults:2,kids:[17]},
    {id:uid(),name:"Pau",paid:80,adults:1,kids:[]},
  ]};
}

function kidWeight(age){ const a=Number(age); if(isNaN(a))return 0;
  if(a<state.config.zero)return 0; if(a<state.config.full)return 0.5; return 1; }
function unitsOf(r){ const k=(r.kids||[]).reduce((s,a)=>s+kidWeight(a),0); return (Number(r.adults)||0)+k; }
function initials(name){ const p=String(name||"").trim().split(/\s+/); return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()||"·"; }

function compute(){
  let totalPaid=0,totalUnits=0;
  state.rows.forEach(r=>{ totalPaid+=Number(r.paid)||0; totalUnits+=unitsOf(r); });
  const cpu=totalUnits>0?totalPaid/totalUnits:0;
  const res=state.rows.map(r=>{ const u=unitsOf(r); const fair=u*cpu; const bal=(Number(r.paid)||0)-fair;
    return {...r,units:u,fair,bal}; });
  return {totalPaid,totalUnits,cpu,res};
}
function nameById(id){ const r=state.rows.find(x=>x.id===id); return r?r.name:"—"; }
function resolveHead(id){            // segueix la cadena de caps fins al de dalt
  const seen=new Set(); let cur=id;
  while(true){
    const r=state.rows.find(x=>x.id===cur);
    if(!r) return id;
    if(!r.headId || !state.rows.some(x=>x.id===r.headId)) return cur; // sense cap vàlid → ell mateix
    if(seen.has(cur)) return cur;     // evita bucles
    seen.add(cur); cur=r.headId;
  }
}
function depsOf(headId){ return state.rows.filter(r=>r.id!==headId && resolveHead(r.id)===headId); }
function groupLabel(id){
  const d=depsOf(id);
  return d.length ? nameById(id)+" (amb "+d.map(x=>x.name.split(" ")[0]).join(", ")+")" : nameById(id);
}
function settle(res){
  const headBal={};                  // ajunta el saldo de cada persona dins el seu cap
  res.forEach(r=>{ const h=resolveHead(r.id); headBal[h]=(headBal[h]||0)+r.bal; });
  const eps=0.005, cred=[],deb=[];
  Object.keys(headBal).forEach(hid=>{ const v=Math.round(headBal[hid]*100)/100;
    if(v>eps)cred.push({id:hid,v}); else if(v<-eps)deb.push({id:hid,v:-v});});
  cred.sort((a,b)=>b.v-a.v); deb.sort((a,b)=>b.v-a.v);
  const tx=[];let i=0,j=0;
  while(i<deb.length&&j<cred.length){ const pay=Math.round(Math.min(deb[i].v,cred[j].v)*100)/100;
    if(pay>0)tx.push({fromId:deb[i].id,toId:cred[j].id,from:nameById(deb[i].id),to:nameById(cred[j].id),amount:pay});
    deb[i].v-=pay;cred[j].v-=pay; if(deb[i].v<=eps)i++; if(cred[j].v<=eps)j++; }
  return tx;
}

function renderHead(){
  const c=compute();
  $("#sTotal").textContent=money(c.totalPaid);
  $("#sPeople").textContent=state.rows.length;
  $("#sUnit").textContent=money(c.cpu);
}
function compMeta(r){
  const ad=Number(r.adults)||0; const nk=(r.kids||[]).length;
  let s=ad+(ad===1?" adult":" adults");
  if(nk) s+=" · "+nk+(nk===1?" nen":" nens");
  if(r.headId && state.rows.some(x=>x.id===r.headId)) s+=" · va amb "+nameById(r.headId).split(" ")[0];
  return s;
}
function renderList(){
  const c=compute(); const box=$("#people");
  if(!state.rows.length){ box.innerHTML='<div class="empty">Encara no hi ha ningú.<br>Afegeix la primera persona.</div>'; return; }
  box.innerHTML=state.rows.map((r,idx)=>{
    const rr=c.res[idx]; const cls=rr.bal>0.005?"pos":rr.bal<-0.005?"neg":"zero";
    const sign=rr.bal>0.005?"+":"";
    const balTxt=rr.bal>0.005?`li deuen ${money(rr.bal)}`:rr.bal<-0.005?`ha de posar ${money(-rr.bal)}`:"al dia";
    return `<div class="card"><div class="person" data-edit="${r.id}">
      <div class="mono">${esc(initials(r.name))}</div>
      <div style="min-width:0;flex:1">
        <div class="nm">${esc(r.name||"(sense nom)")}</div>
        <div class="meta">${esc(compMeta(r))} · part justa ${money(rr.fair)}</div>
      </div>
      <div class="amt">
        <div class="p num">${money(r.paid)}</div>
        <div class="bal ${cls} num">${balTxt}</div>
      </div>
    </div></div>`;
  }).join("");
}
function renderRes(){
  const box=$("#resBody"); const c=compute();
  if(state.rows.length<2){ box.innerHTML='<div class="empty">Afegeix com a mínim dues persones<br>per veure qui paga a qui.</div>'; return; }
  const tx=settle(c.res);
  let pays = tx.length
    ? tx.map(t=>`<div class="pay">
        <div><div class="who">${esc(groupLabel(t.fromId))}</div></div>
        <span class="arr">${IC.arr}</span>
        <div><div class="who">${esc(groupLabel(t.toId))}</div></div>
        <span class="val num">${money(t.amount)}</span></div>`).join("")
    : '<div class="empty">Tot quadrat. Ningú deu res.</div>';
  const bals=[...c.res].sort((a,b)=>b.bal-a.bal).map(r=>{
    const cls=r.bal>0.005?"pos":r.bal<-0.005?"neg":"zero"; const sign=r.bal>0.005?"+":"";
    const withHead=(r.headId && state.rows.some(x=>x.id===r.headId))?" · amb "+esc(nameById(r.headId).split(" ")[0]):"";
    return `<div class="balrow"><div class="mono" style="width:34px;height:34px;font-size:12px">${esc(initials(r.name))}</div>
      <div><div class="nm">${esc(r.name)}</div><div class="meta">pagat ${money(r.paid)} · just ${money(r.fair)}${withHead}</div></div>
      <span class="b ${cls} num">${sign}${money(r.bal)}</span></div>`;
  }).join("");
  box.innerHTML=`
    <div class="sect">Qui paga a qui</div>
    ${pays}
    <button class="btn btn-primary" id="shareBtn" style="margin:6px 0 20px">${IC.share}<span>Compartir per WhatsApp</span></button>
    <div class="sect">Saldo de cadascú</div>
    <div class="card" style="padding:2px 14px">${bals}</div>
    <div class="hint"><b style="color:var(--pos)">Verd</b>: li deuen diners. <b style="color:var(--neg)">Vermell</b>: ha de posar diners. Els qui van amb un cap de família es liquiden junts a través seu.</div>`;
  $("#shareBtn")?.addEventListener("click",share);
}
function renderAll(){ renderHead(); renderList(); renderRes(); save(); }

/* NAV */
$("#t1").innerHTML=IC.list; $("#t2").innerHTML=IC.swap;
$("#settingsBtn").innerHTML=IC.gear; $("#addBtn").innerHTML=IC.plus+"<span>Afegir persona</span>";
$$(".tab").forEach(t=>t.addEventListener("click",()=>{
  $$(".tab").forEach(x=>x.classList.toggle("on",x===t));
  $$(".view").forEach(v=>v.classList.toggle("on",v.id==="v-"+t.dataset.v));
  window.scrollTo({top:0,behavior:"smooth"});
}));

/* SHEET */
function openSheet(html){ $("#sheetBody").innerHTML=html; $("#scrim").classList.add("on"); $("#sheet").classList.add("on"); }
function closeSheet(){ $("#scrim").classList.remove("on"); $("#sheet").classList.remove("on"); }
$("#scrim").addEventListener("click",closeSheet);
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),2000); }

/* PERSON FORM */
function personForm(id){
  const r=id?state.rows.find(x=>x.id===id):{id:null,name:"",paid:"",adults:1,kids:[]};
  let kids=[...(r.kids||[])];
  openSheet(`
    <div class="head"><h2>${id?"Editar persona":"Nova persona"}</h2><button id="x">${IC.close}</button></div>
    <div class="grp"><label class="lab2">Nom</label>
      <input class="fld" id="fName" placeholder="Nom de la persona o família" value="${esc(r.name)}"></div>
    <div class="grp"><label class="lab2">Ha pagat (€)</label>
      <input class="fld num" id="fPaid" type="text" inputmode="decimal" placeholder="0,00" value="${r.paid!==""&&r.paid!=null?String(r.paid).replace(".",","):""}"></div>
    <div class="grp"><label class="lab2">Adults</label>
      <div class="stepper" style="max-width:200px"><button id="aMinus">−</button><input class="num" id="fAdults" type="text" inputmode="numeric" value="${Number(r.adults)||0}"><button id="aPlus">+</button></div></div>
    <label class="lab2">Nens (posa l'edat de cadascun)</label>
    <div id="kids"></div>
    <button class="addkid" id="addKid">${IC.plus}<span>Afegir nen</span></button>
    <div class="grp" style="margin-top:16px"><label class="lab2">Qui se'n fa càrrec? (cap de família)</label>
      <select class="fld" id="fHead"><option value="">— Es paga ell mateix —</option>${state.rows.filter(x=>x.id!==r.id).map(x=>`<option value="${x.id}" ${x.id===r.headId?"selected":""}>${esc(x.name)}</option>`).join("")}<option value="__new__">+ Crear nova persona com a cap…</option></select>
      <div class="hint" style="margin:6px 2px 0">Si tries algú, aquesta persona va amb ell: s'ajunten els saldos i no es deuen res entre ells. Qui no tingui cap, paga ell mateix.</div></div>
    <button class="btn btn-primary" id="saveP" style="margin-top:16px">${id?"Desar":"Afegir"}</button>
    ${id?`<button class="btn" id="delP" style="margin-top:9px;color:var(--neg);background:var(--neg-bg)">Eliminar</button>`:""}
  `);
  function pctClass(w){ return w===1?"p100":w===0.5?"p50":"p0"; }
  function pctTxt(w){ return w===1?"100%":w===0.5?"50%":"0%"; }
  function drawKids(){
    $("#kids").innerHTML=kids.map((age,i)=>{
      const w=kidWeight(age);
      return `<div class="kid"><input class="fld num" type="text" inputmode="numeric" data-k="${i}" placeholder="edat" value="${age??""}">
        <span class="w ${pctClass(w)}">${pctTxt(w)}</span>
        <button class="del" data-dk="${i}">${IC.trash}</button></div>`;
    }).join("");
    $$("[data-k]").forEach(inp=>inp.addEventListener("input",e=>{ kids[+e.target.dataset.k]=e.target.value===""?"":parseInt(e.target.value,10);
      const w=kidWeight(kids[+e.target.dataset.k]); const tag=e.target.nextElementSibling; tag.className="w "+pctClass(w); tag.textContent=pctTxt(w); }));
    $$("[data-dk]").forEach(b=>b.addEventListener("click",()=>{ kids.splice(+b.dataset.dk,1); drawKids(); }));
  }
  drawKids();
  $("#x").onclick=closeSheet;
  $("#addKid").onclick=()=>{ kids.push(""); drawKids(); };
  const adInput=$("#fAdults");
  $("#aMinus").onclick=()=>{ adInput.value=Math.max(0,(parseInt(adInput.value,10)||0)-1); };
  $("#aPlus").onclick=()=>{ adInput.value=(parseInt(adInput.value,10)||0)+1; };
  function rebuildHeadOptions(selId){
    $("#fHead").innerHTML='<option value="">— Es paga ell mateix —</option>'
      +state.rows.filter(x=>x.id!==r.id).map(x=>`<option value="${x.id}" ${x.id===selId?"selected":""}>${esc(x.name)}</option>`).join("")
      +'<option value="__new__">+ Crear nova persona com a cap…</option>';
  }
  $("#fHead").addEventListener("change",function(){
    if(this.value==="__new__"){
      const nm=prompt("Nom de qui se'n fa càrrec (cap de família):");
      if(nm && nm.trim()){
        const h={id:uid(),name:nm.trim(),paid:0,adults:0,kids:[],headId:null};
        state.rows.push(h); save(); rebuildHeadOptions(h.id);
        toast("Cap creat: "+h.name+" — edita'l després si vols posar-hi el que ha pagat");
      } else { this.value=r.headId||""; }
    }
  });
  $("#saveP").onclick=()=>{
    const name=$("#fName").value.trim(); if(!name){ toast("Posa un nom"); return; }
    const paid=parseFloat(($("#fPaid").value||"").replace(",","."))||0;
    const adults=Math.max(0,parseInt(adInput.value,10)||0);
    const cleanKids=kids.map(a=>a===""||a==null?null:parseInt(a,10)).filter(a=>a!=null&&!isNaN(a)&&a>=0);
    const headId=$("#fHead").value||null;
    if(id){ Object.assign(state.rows.find(x=>x.id===id),{name,paid,adults,kids:cleanKids,headId}); }
    else{ state.rows.push({id:uid(),name,paid,adults,kids:cleanKids,headId}); }
    closeSheet(); renderAll(); toast("Desat");
  };
  $("#delP")&&($("#delP").onclick=()=>{ state.rows=state.rows.filter(x=>x.id!==id); closeSheet(); renderAll(); toast("Eliminat"); });
}
$("#addBtn").addEventListener("click",()=>personForm(null));
document.addEventListener("click",e=>{ const c=e.target.closest("[data-edit]"); if(c) personForm(c.dataset.edit); });

/* SETTINGS */
function settings(){
  openSheet(`
    <div class="head"><h2>Ajustos</h2><button id="x">${IC.close}</button></div>
    <div class="two grp">
      <div><label class="lab2">Menys de… anys paguen 0%</label>
        <input class="fld num" id="cZero" type="text" inputmode="numeric" value="${state.config.zero}"></div>
      <div><label class="lab2">… anys o més paguen 100%</label>
        <input class="fld num" id="cFull" type="text" inputmode="numeric" value="${state.config.full}"></div>
    </div>
    <div class="hint" style="margin:0 2px 18px">Entre aquestes dues edats, els nens paguen el 50%. Els adults sempre paguen el 100%.</div>
    <div class="menu">
      <a id="mShare"><span class="mi">${IC.share}</span>Compartir resultat per WhatsApp</a>
      <a id="mExample"><span class="mi">${IC.beaker}</span>Carregar dades d'exemple</a>
      <a id="mClear" class="danger"><span class="mi">${IC.trash}</span>Esborrar-ho tot</a>
    </div>
  `);
  $("#x").onclick=closeSheet;
  $("#cZero").addEventListener("input",e=>{ const v=parseInt(e.target.value,10); if(!isNaN(v)){ state.config.zero=Math.max(0,Math.min(v,state.config.full)); renderAll(); } });
  $("#cFull").addEventListener("input",e=>{ const v=parseInt(e.target.value,10); if(!isNaN(v)){ state.config.full=Math.max(state.config.zero,v); renderAll(); } });
  $("#mShare").onclick=()=>{ closeSheet(); share(); };
  $("#mExample").onclick=()=>{ if(confirm("Carregar dades d'exemple? Es perdrà el que tinguis ara.")){ state=seed(); renderAll(); closeSheet(); toast("Exemple carregat"); } };
  $("#mClear").onclick=()=>{ if(confirm("Segur que vols esborrar-ho tot?")){ state={config:{zero:3,full:12},rows:[]}; renderAll(); closeSheet(); toast("Esborrat"); } };
}
$("#settingsBtn").addEventListener("click",settings);

/* SHARE */
function summaryText(){
  const c=compute(); const tx=settle(c.res);
  let s="Càlculs Canet — Repartiment\n";
  s+="Total pagat: "+money(c.totalPaid)+"\n\nQui paga a qui:\n";
  s+= tx.length ? tx.map(t=>"• "+t.from+" → "+t.to+": "+money(t.amount)).join("\n") : "Tot quadrat, ningú deu res.";
  s+="\n\nSaldo de cadascú:\n";
  s+=[...c.res].sort((a,b)=>b.bal-a.bal).map(r=>{const sign=r.bal>0.005?"+":"";return "• "+r.name+": "+sign+money(r.bal);}).join("\n");
  return s;
}
async function share(){
  const text=summaryText();
  if(navigator.share){ try{ await navigator.share({title:"Càlculs Canet",text}); return; }catch(e){ if(e.name==="AbortError")return; } }
  try{ await navigator.clipboard.writeText(text); toast("Resultat copiat"); }
  catch(e){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");toast("Resultat copiat");}catch(_){alert(text);} ta.remove(); }
}

renderAll();

if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
